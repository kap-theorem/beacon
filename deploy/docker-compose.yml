# ---------------------------------------------------------------------------
# Beacon — local / self-hosted production-style stack
#
# Prerequisites
#   1. Build the image first:  docker build -t beacon:local .
#   2. Copy env templates and fill real secrets:
#        cp deploy/env/server.env.example deploy/env/server.env
#        cp deploy/env/worker.env.example deploy/env/worker.env
#   3. (Optional) Configure Cloudflare Tunnel — see cloudflared service below.
# ---------------------------------------------------------------------------

services:

  # --------------------------------------------------------------------------
  # PostgreSQL — Temporal persistence backend
  # --------------------------------------------------------------------------
  postgresql:
    image: postgres:15
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Temporal — auto-setup initialises the schema and starts the server
  # --------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      # Database driver
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgresql
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      # Namespace is auto-created on first start
      DEFAULT_NAMESPACE: default
      # Dynamic config file (mounted below)
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    volumes:
      - ./dynamicconfig/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    ports:
      - "7233:7233"
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Temporal UI
  # --------------------------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:8080"
    ports:
      - "8080:8080"
    depends_on:
      - temporal
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Beacon HTTP server
  # --------------------------------------------------------------------------
  beacon-server:
    image: beacon:local
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ./env/server.env
    environment:
      # Always wire to the compose-internal Temporal address.
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "6969:6969"
    depends_on:
      - temporal
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Beacon email worker — one container per SMTP provider
  #
  # To add a second provider (e.g. mailgun), duplicate this service block and
  # change the service name to beacon-worker-mailgun and set
  # WORKER_SPEC=email-mailgun.  Each worker polls the same Temporal task queue
  # but routes delivery through the named provider's SMTP config loaded from
  # Infisical.
  # --------------------------------------------------------------------------
  beacon-worker-sendgrid:
    image: beacon:local
    command: ["/usr/local/bin/email_worker"]
    env_file:
      - ./env/worker.env
    environment:
      WORKER_SPEC: email-sendgrid
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Cloudflare Tunnel — exposes beacon-server to the internet via Zero Trust.
  #
  # IMPORTANT: This service requires a real Cloudflare Tunnel before it will
  # work.  Steps:
  #   1. Run: cloudflared tunnel create beacon
  #   2. Place the generated <TUNNEL_ID>.json in deploy/cloudflared/
  #   3. Update deploy/cloudflared/config.yml with your TUNNEL_ID and hostname.
  #   4. See the runbook in docs/ for Access policy configuration.
  #
  # /v1/notify/email requires a per-service API key at the app layer; Cloudflare
  # Access policies configured in the Zero Trust dashboard are defense-in-depth
  # on top of that, not the only protection.  Refer to deploy/cloudflared/config.yml
  # for details.
  # --------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      # Mount the tunnel credentials file — the filename must match the
      # credentials-file path set in config.yml (e.g. <TUNNEL_ID>.json).
      - ./cloudflared:/etc/cloudflared:ro
    environment:
      TUNNEL_CONFIG: /etc/cloudflared/config.yml
    depends_on:
      - beacon-server
    restart: unless-stopped

volumes:
  postgres-data:
