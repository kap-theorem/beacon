# ---------------------------------------------------------------------------
# Beacon — local DEV_MODE stack (no external secrets manager)
#
# Usage (Docker daemon required for `up`; syntax-validated offline):
#   docker compose -f deploy/docker-compose.local.yml up
#
# NOTE: This file was syntax-validated with `docker compose config` but the
# live Phase-5 checks were executed via the binary fallback (no Docker daemon
# available at validation time).  See docs/FEATURE_READINESS.md.
# ---------------------------------------------------------------------------

services:

  # --------------------------------------------------------------------------
  # Temporal — in-process dev server (single binary, no Postgres required)
  # --------------------------------------------------------------------------
  temporal:
    image: temporalio/temporal:latest
    environment:
      TEMPORAL_BROADCAST_ADDRESS: "0.0.0.0"
    ports:
      - "7233:7233"
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Temporal UI
  # --------------------------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:8080"
    ports:
      - "8080:8080"
    depends_on:
      - temporal
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Mailpit — local SMTP sink + web UI
  # --------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web / REST API
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Beacon HTTP server
  # --------------------------------------------------------------------------
  beacon-server:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DEV_MODE: "true"
      DEV_SMTP_HOST: mailpit
      DEV_SMTP_PORT: "1025"
      DEV_SMTP_NAME: dev
      DEV_SMTP_FROM: noreply@beacon.local
      DEV_SMTP_FROM_NAME: Beacon
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      SERVER_PORT: "6969"
      ADMIN_TOKEN: devsecret
    ports:
      - "6969:6969"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6969/healthz/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - temporal
      - mailpit
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Beacon email worker — dev provider auto-selected (single provider)
  # --------------------------------------------------------------------------
  beacon-email-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/usr/local/bin/email_worker"]
    environment:
      DEV_MODE: "true"
      DEV_SMTP_HOST: mailpit
      DEV_SMTP_PORT: "1025"
      DEV_SMTP_NAME: dev
      DEV_SMTP_FROM: noreply@beacon.local
      DEV_SMTP_FROM_NAME: Beacon
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
    depends_on:
      - temporal
      - mailpit
    restart: unless-stopped
