# ---------------------------------------------------------------------------
# Cloudflare Tunnel configuration for Beacon
#
# SECURITY WARNING: the ingress rules below route /v1/notify/email and
# /v1/dlq/* to beacon-server, but Cloudflare Access policies are not
# sufficient authentication on their own — they gate access to the tunnel
# hostname, not to the API.
#
# You MUST create a Cloudflare Access "Self-Hosted Application" covering
# at minimum the /v1/notify/email and /v1/dlq/* paths and require a Service
# Token (or another suitable identity provider policy) before exposing this
# tunnel publicly.
#
# Per-service API-key auth (Authorization: Bearer / X-API-Key) already exists
# at the app layer — every /v1/* request is authenticated and policy-checked
# by beacon-server regardless of Cloudflare Access. Access is defense-in-depth
# on top of that: it stops unauthenticated traffic at the edge, before it can
# even reach the app-layer key check.
# ---------------------------------------------------------------------------

tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/<TUNNEL_ID>.json

ingress:
  # Health probes are public — infrastructure/load-balancer use only.
  - hostname: beacon.example.com
    path: /healthz/*
    service: http://beacon-server:6969

  # /v1/notify/email and /v1/dlq/* MUST be protected by a Cloudflare Access
  # application (service tokens) configured in the Zero Trust dashboard, as
  # defense-in-depth in front of beacon-server's own per-service API-key auth.
  - hostname: beacon.example.com
    path: /v1/notify/email
    service: http://beacon-server:6969

  - hostname: beacon.example.com
    path: /v1/dlq/*
    service: http://beacon-server:6969

  # Catch-all: return 404 for any unmatched hostname or path.
  - service: http_status:404
